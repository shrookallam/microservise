services:

  kong:
    image: kong:3.6
    container_name: kong
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong.yml
    volumes:
      - ./kong.yml:/kong.yml
    networks:
      - micro_net

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - micro_net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - micro_net

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service
    working_dir: /app/auth-service
    volumes:
      - ./:/app
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "8001:8000"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - micro_net

  product-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product-service
    working_dir: /app/product-service
    volumes:
      - ./:/app
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - micro_net

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-service
    working_dir: /app/order-service
    volumes:
      - ./:/app
      - ./supervisord.conf:/etc/supervisor/conf.d/order-service.conf
    command: supervisord -n -c /etc/supervisor/conf.d/order-service.conf
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - micro_net

networks:
  micro_net:
    driver: bridge