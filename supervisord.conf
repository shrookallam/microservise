[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:artisan-serve]
command=php artisan serve --host=0.0.0.0 --port=8000
directory=/app/order-service
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:kafka-consumer]
command=php artisan kafka:consume-products
directory=/app/order-service
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0